server {
    listen 8181;

    root /var/www/homelab;
    index index.html;

    # Dashboard
    location / {
        try_files $uri $uri/ =404;
    }

    # Saad / Period Tracker
    location /saad/ {
        alias /var/www/homelab/saad/;
        try_files $uri $uri/ /saad/index.html;
    }

    # Boggler / Cookbook
    location /cookbook/ {
        alias /var/www/homelab/cookbook/;
        try_files $uri $uri/ /cookbook/index.html;
    }

    # Collector
    location /collector/ {
        alias /var/www/homelab/collector/;
        try_files $uri $uri/ /collector/index.html;
    }

    # Saad API
    location /api/ {
        proxy_pass         http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Cookbook API
    location /cookbook-api/ {
        proxy_pass         http://127.0.0.1:3001/cookbook-api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Collector API
    location /collector-api/ {
        proxy_pass         http://127.0.0.1:3002/collector-api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Stats API
    location /stats {
        proxy_pass         http://127.0.0.1:3003/stats;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Ledger
    location /ledger/ {
        alias /var/www/homelab/ledger/;
        try_files $uri $uri/ /ledger/index.html;
    }

    # Ledger API
    location /ledger-api/ {
        proxy_pass         http://127.0.0.1:3004/ledger-api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Calories frontend
    location /calories/ {
        alias /var/www/homelab/calories/;
        try_files $uri $uri/ /calories/index.html;
    }

    # Calories API
    location /calories-api/ {
        proxy_pass         http://127.0.0.1:3006/calories-api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Calendar frontend
    location /calendar/ {
        alias /var/www/homelab/calendar/;
        try_files $uri $uri/ /calendar/index.html;
    }

    # Calendar API
    location /calendar-api/ {
        proxy_pass         http://127.0.0.1:3007/calendar-api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;
}

# ── Plain HTTP cert download — no HTTPS required ──────────────
# New devices use this to download the CA cert before installing it.
# Only serves rootCA.pem, nothing else.
server {
    listen 8282;

    location = /rootCA.pem {
        root /var/www/homelab;
        default_type application/x-pem-file;
        add_header Content-Disposition 'attachment; filename="rootCA.pem"';
    }

    # Block everything else
    location / {
        return 404;
    }
}
